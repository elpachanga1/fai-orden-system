<div class="container col-xl-10 px-4 py-5">
  <div class="row align-items-center g-lg-5 py-5">
    <div class="col-lg-7 text-center text-lg-start">
      <h1 class="display-4 fw-bold lh-1 text-body-emphasis mb-3">
        Online ordering system
      </h1>
      <p class="col-lg-10 fs-4">
        It is necessary to log in to carry out verifications
      </p>
    </div>
    <div class="col-md-10 mx-auto col-lg-5">
      <form class="p-4 p-md-5 border rounded-3 bg-body-tertiary" (ngSubmit)="onLogin()">
        <div class="form-floating mb-3">
          <input
            class="form-control"
            id="userName"
            placeholder="username"
            [(ngModel)]="username"
            name="username"
          />
          <label for="userName">Username</label>
        </div>
        <div class="form-floating mb-3">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Password"
            [(ngModel)]="password"
            name="password"
          />
          <label for="password">Password</label>
        </div>
        <div class="checkbox mb-3">
          <label>
            <input type="checkbox" value="remember-me" /> Remember me
          </label>
        </div>
        <button type="submit" class="w-100 btn btn-lg btn-primary">Sign in</button>
        <hr class="my-4" />
      </form>
    </div>
  </div>
</div>
