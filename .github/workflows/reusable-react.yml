name: Reusable — React

on:
  workflow_call:
    inputs:
      deploy:
        description: "Si es true, despliega al Static Web App despues de build+test."
        type: boolean
        default: false
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: false
      REACT_APP_API_URL:
        required: false

env:
  WORKING_DIR: frontend/carrito-compras-react
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: Lint
        run: npm run lint --if-present
        working-directory: ${{ env.WORKING_DIR }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.WORKING_DIR }}
        env:
          # CRA inyecta REACT_APP_* en el bundle en tiempo de build.
          # En CI (is-pr/branch) no hay secret disponible — usamos placeholder
          # para que el build no falle; el deploy real usa el secret correcto.
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'http://localhost:5000' }}

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests
        working-directory: ${{ env.WORKING_DIR }}

  deploy:
    name: Deploy to Static Web App
    runs-on: ubuntu-latest
    needs: build-and-test
    if: inputs.deploy
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Static Web App
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: "upload"
          app_location: "frontend/carrito-compras-react"
          output_location: "build"
          api_location: ""
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

