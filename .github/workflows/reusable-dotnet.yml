name: Reusable — .NET

on:
  workflow_call:
    inputs:
      deploy:
        description: "Si es true, construye la imagen Docker, la sube al ACR y actualiza el Container App."
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      AZURE_ACR_LOGIN_SERVER:
        required: false
      AZURE_CONTAINER_APP_NAME:
        required: false
      AZURE_RESOURCE_GROUP:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend-dotnet/CarritoComprasBackend.sln

      - name: Build
        run: dotnet build backend-dotnet/CarritoComprasBackend.sln --configuration Release --no-restore /consoleloggerparameters:NoSummary

      - name: Test
        run: dotnet test backend-dotnet/CarritoComprasBackend.sln --no-build --configuration Release --logger "console;verbosity=normal" --nologo

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-and-test
    if: inputs.deploy
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ vars.AZURE_ACR_LOGIN_SERVER }} \
            --image backend:${{ github.sha }} \
            --image backend:latest \
            --file backend-dotnet/src/CarritoComprasBackend/Dockerfile \
            backend-dotnet

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ vars.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.AZURE_ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

