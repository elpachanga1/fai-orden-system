name: Reusable — .NET

on:
  workflow_call:
    inputs:
      deploy:
        description: "Si es true, despliega al App Service despues de build+test."
        type: boolean
        default: false
      app_name:
        description: "Nombre del App Service (ej: app-carrito-dev)."
        type: string
        default: ""
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Un solo job: build y test son secuenciales por naturaleza (test depende del
  # binario producido por build), por lo que no hay paralelismo posible.
  # Consolidarlos evita instanciar una segunda máquina, hacer un segundo checkout
  # y un segundo restore — lo que reduciría el tiempo total sin ningún beneficio.
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend-dotnet/CarritoComprasBackend.sln

      - name: Build
        run: dotnet build backend-dotnet/CarritoComprasBackend.sln --configuration Release --no-restore /consoleloggerparameters:NoSummary

      - name: Test
        run: dotnet test backend-dotnet/CarritoComprasBackend.sln --no-build --configuration Release --logger "console;verbosity=normal" --nologo

      - name: Publish
        if: inputs.deploy
        run: dotnet publish backend-dotnet/src/CarritoComprasBackend/ShoppingCartBackEnd.csproj --configuration Release --output ./publish /consoleloggerparameters:NoSummary

      - name: Upload publish artifact
        if: inputs.deploy
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-publish
          path: ./publish
          retention-days: 1

  deploy:
    name: Deploy to App Service
    runs-on: ubuntu-latest
    needs: build-and-test
    if: inputs.deploy
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-publish
          path: ./publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.app_name }}
          package: ./publish

