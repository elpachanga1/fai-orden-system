name: Reusable — Terraform

on:
  workflow_call:
    inputs:
      deploy:
        description: "Si es true, corre terraform apply despues del plan (requiere aprobacion del environment 'production')."
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      TF_STATE_STORAGE_KEY:
        required: true
      TF_POSTGRESQL_PASSWORD:
        required: true
      TF_JWT_SECRET_KEY:
        required: true
      TF_GITHUB_TOKEN:
        required: true

env:
  TF_VERSION: "1.10.5"

defaults:
  run:
    working-directory: terraform

jobs:
  # ---------------------------------------------------------------
  # Plan — siempre corre (en PR y en push a main)
  # En PR: comenta el resultado del plan en el PR
  # En push a main: sube el plan como artifact para el job apply
  # ---------------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC: necesario para azure login
      contents: read
      pull-requests: write # para comentar el plan en PRs
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ env.TF_VERSION }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ env.TF_VERSION }}-

      # backend.conf se genera en el runner — no esta en el repo (ver .gitignore).
      - name: Generate backend.conf
        run: |
          cat > backend.conf << EOF
          resource_group_name  = "rg-tfstate"
          storage_account_name = "${{ vars.TF_STATE_STORAGE_ACCOUNT }}"
          container_name       = "tfstate"
          key                  = "carrito-compras.tfstate"
          access_key           = "${{ secrets.TF_STATE_STORAGE_KEY }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.conf

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          TF_LOG: DEBUG
        run: |
          terraform plan -no-color -out=tfplan -parallelism=20 \
            -var="postgresql_admin_password=${{ secrets.TF_POSTGRESQL_PASSWORD }}" \
            -var="jwt_secret_key=${{ secrets.TF_JWT_SECRET_KEY }}" \
          2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncado)'
              : plan;
            const body = `### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

      - name: Upload plan artifact
        if: inputs.deploy
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # ---------------------------------------------------------------
  # Apply — solo cuando deploy=true (push a main)
  # Requiere aprobacion manual del environment 'production'.
  # Crear en: GitHub → Settings → Environments → production
  # ---------------------------------------------------------------
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: inputs.deploy
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ env.TF_VERSION }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ env.TF_VERSION }}-

      - name: Generate backend.conf
        run: |
          cat > backend.conf << EOF
          resource_group_name  = "rg-tfstate"
          storage_account_name = "${{ vars.TF_STATE_STORAGE_ACCOUNT }}"
          container_name       = "tfstate"
          key                  = "carrito-compras.tfstate"
          access_key           = "${{ secrets.TF_STATE_STORAGE_KEY }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.conf

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
