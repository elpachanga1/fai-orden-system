name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_backend:
        description: 'Correr pipeline de backend (.NET)'
        type: boolean
        default: true
      run_frontend:
        description: 'Correr pipeline de frontend (React)'
        type: boolean
        default: true
      run_terraform:
        description: 'Correr pipeline de Terraform'
        type: boolean
        default: true

# id-token: write es requerido por reusable-terraform y reusable-dotnet (OIDC login).
# El permiso se declara aqui porque GitHub solo puede elevar permisos del caller,
# no del reusable por si solo.
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # workflow_dispatch: usamos inputs explícitamente (true/false).
      # push/PR: usamos el diff de paths. paths-filter sin diff retorna 'true',
      # por eso no podemos hacer fallback a filter en workflow_dispatch.
      backend: ${{
        (github.event_name == 'workflow_dispatch' && inputs.run_backend) ||
        (github.event_name != 'workflow_dispatch' && steps.filter.outputs.backend) }}
      frontend: ${{
        (github.event_name == 'workflow_dispatch' && inputs.run_frontend) ||
        (github.event_name != 'workflow_dispatch' && steps.filter.outputs.frontend) }}
      terraform: ${{
        (github.event_name == 'workflow_dispatch' && inputs.run_terraform) ||
        (github.event_name != 'workflow_dispatch' && steps.filter.outputs.terraform) }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend-dotnet/**'
              - '.github/workflows/reusable-dotnet.yml'
              - '.github/workflows/ci-cd.yml'
            frontend:
              - 'frontend/react/**'
              - '.github/workflows/reusable-react.yml'
              - '.github/workflows/ci-cd.yml'
            terraform:
              - 'terraform/**'
              - '.github/workflows/reusable-terraform.yml'
              - '.github/workflows/ci-cd.yml'

      # - name: Debug — decision variables
      #   run: |
      #     echo "event_name:       ${{ github.event_name }}"
      #     echo "in.run_backend:   ${{ inputs.run_backend }}"
      #     echo "in.run_frontend:  ${{ inputs.run_frontend }}"
      #     echo "in.run_terraform: ${{ inputs.run_terraform }}"
      #     echo "filter.backend:   ${{ steps.filter.outputs.backend }}"
      #     echo "filter.frontend:  ${{ steps.filter.outputs.frontend }}"
      #     echo "filter.terraform: ${{ steps.filter.outputs.terraform }}"

  # build + test siempre; deploy solo en push a main.
  # Si hubo cambios de terraform, se omite para no desplegar sobre infra en transicion.
  dotnet:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' &&
      needs.detect-changes.outputs.terraform != 'true'
    uses: ./.github/workflows/reusable-dotnet.yml
    with:
      deploy: ${{
        (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
        github.ref == 'refs/heads/main' }}

  # build + test siempre; deploy solo en push a main.
  # Si hubo cambios de terraform, se omite para no desplegar sobre infra en transicion.
  react:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' &&
      needs.detect-changes.outputs.terraform != 'true'
    uses: ./.github/workflows/reusable-react.yml
    with:
      deploy: ${{
        (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
        github.ref == 'refs/heads/main' }}
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

  # debug-outputs:
  #   runs-on: ubuntu-latest
  #   needs: [detect-changes, terraform]
  #   if: always()
  #   steps:
  #     - name: Log needs context
  #       run: |
  #         echo "github.ref           = ${{ github.ref }}"
  #         echo "event_name            = ${{ github.event_name }}"
  #         echo "inputs                = ${{ toJSON(inputs) }}"
  #         echo "detect-changes.outputs = ${{ toJSON(needs.detect-changes.outputs) }}"
  #         echo "terraform             = ${{ toJSON(needs.terraform) }}"

  # plan siempre; apply solo en push a main (con aprobacion del environment 'production')
  terraform:
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    uses: ./.github/workflows/reusable-terraform.yml
    with:
      deploy: ${{
        (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
        github.ref == 'refs/heads/main' }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_STATE_STORAGE_KEY: ${{ secrets.TF_STATE_STORAGE_KEY }}
      TF_POSTGRESQL_PASSWORD: ${{ secrets.TF_POSTGRESQL_PASSWORD }}
      TF_JWT_SECRET_KEY: ${{ secrets.TF_JWT_SECRET_KEY }}
      TF_GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}

